spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**
        - id: post-service
          uri: ${POST_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/posts/**, /api/stories/**, /api/explore/**
        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/media/**
        - id: chat-service
          uri: ${CHAT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/messages/**, /ws/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/notifications/**

server:
  port: 8080
