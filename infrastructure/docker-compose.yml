version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aura-postgres
    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_pass123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aura-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api-gateway:
    build: ../backend/api-gateway
    container_name: aura-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - user-service
      - post-service
      - media-service
      - chat-service
      - notification-service

  auth-service:
    build: ../backend/auth-service
    container_name: aura-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build: ../backend/user-service
    container_name: aura-users
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
    depends_on:
      postgres:
        condition: service_healthy

  post-service:
    build: ../backend/post-service
    container_name: aura-posts
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/post_db
    depends_on:
      postgres:
        condition: service_healthy

  media-service:
    build: ../backend/media-service
    container_name: aura-media
    ports:
      - "8084:8084"
    environment:
      APP_STORAGE_ENDPOINT: http://minio:9000
    depends_on:
      - minio

  chat-service:
    build: ../backend/chat-service
    container_name: aura-chat
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chat_db
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build: ../backend/notification-service
    container_name: aura-notifications
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
