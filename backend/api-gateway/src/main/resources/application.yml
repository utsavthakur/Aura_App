spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
        - id: post-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/posts/**, /api/stories/**, /api/explore/**
        - id: media-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/media/**
        - id: chat-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/messages/**, /ws/**
        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/notifications/**

server:
  port: 8080
